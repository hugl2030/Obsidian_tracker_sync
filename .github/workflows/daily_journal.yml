name: Daily Journal Tracker

on:
  schedule:
    # 15:00 UTC = 08:00 San Francisco (PDT, UTC-7, Mar–Nov)
    # Note: during PST (UTC-8, Nov–Mar) this fires at 07:00 SF time
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date (YYYY-MM-DD), leave empty for yesterday"
        required: false
        default: ""

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout tracker repo
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Resolve target date (yesterday SF time) ─────────────────────────
      - name: Set target date
        id: date
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            TARGET="${{ github.event.inputs.date }}"
          else
            # Yesterday in San Francisco time (UTC-7 PDT / UTC-8 PST)
            TARGET=$(TZ="America/Los_Angeles" date -d "yesterday" +%Y-%m-%d 2>/dev/null \
                     || TZ="America/Los_Angeles" date -v-1d +%Y-%m-%d)
          fi
          echo "target=${TARGET}" >> $GITHUB_OUTPUT
          echo "year=${TARGET:0:4}" >> $GITHUB_OUTPUT
          echo "Target date: ${TARGET}"

      # ── 4. Run the tracker ──────────────────────────────────────────────────
      - name: Run journal tracker
        env:
          ZHIPUAI_API_KEY: ${{ secrets.ZHIPUAI_API_KEY }}
        run: |
          python main.py --date ${{ steps.date.outputs.target }} --verbose

      # ── 5. Commit output to this repo ───────────────────────────────────────
      - name: Commit output files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "📰 Daily digest ${{ steps.date.outputs.target }}"
            git push
          fi

      # ── 6. Sync to Obsidian vault repo ─────────────────────────────────────
      - name: Sync to Obsidian vault
        env:
          OBSIDIAN_TOKEN: ${{ secrets.OBSIDIAN_SYNC_TOKEN }}
          OBSIDIAN_REPO: ${{ secrets.OBSIDIAN_REPO }}
        run: |
          if [ -z "$OBSIDIAN_REPO" ] || [ -z "$OBSIDIAN_TOKEN" ]; then
            echo "⚠️  OBSIDIAN_REPO or OBSIDIAN_SYNC_TOKEN not set — skipping Obsidian sync."
            exit 0
          fi

          TARGET="${{ steps.date.outputs.target }}"
          YEAR="${{ steps.date.outputs.year }}"
          VAULT_DIR="10_Journals/daily-papers/${YEAR}"
          MD_FILE="output/${YEAR}/${TARGET}.md"

          if [ ! -f "$MD_FILE" ]; then
            echo "❌ Markdown file not found: $MD_FILE"
            ls output/ 2>/dev/null || echo "(output dir is empty)"
            exit 1
          fi

          # Clone Obsidian vault
          git clone --depth=1 \
            "https://x-access-token:${OBSIDIAN_TOKEN}@github.com/${OBSIDIAN_REPO}.git" \
            obsidian_vault

          # Copy markdown to vault
          mkdir -p "obsidian_vault/${VAULT_DIR}"
          cp "$MD_FILE" "obsidian_vault/${VAULT_DIR}/${TARGET}.md"
          cp "output/latest.md" "obsidian_vault/10_Journals/daily-papers/latest.md" 2>/dev/null || true

          # Commit & push
          cd obsidian_vault
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${VAULT_DIR}/${TARGET}.md" "10_Journals/daily-papers/latest.md" 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes in Obsidian vault."
          else
            git commit -m "📰 Journal digest ${TARGET}"
            git push
          fi

      # ── 6. Save artifact ────────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: journal-digest-${{ github.run_number }}
          path: output/
          retention-days: 7
